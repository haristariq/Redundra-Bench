  \ (lines that are empty\nor whitespace-only). Return the list of sections with surrounding\nwhitespace\
  \ stripped from each, dropping any empty sections. Sections\nhave variable length.\n  split_sections('a\\\
  nb\\n\\nc') -> ['a\\nb', 'c']\n"
fail_to_pass:
- tests/test_documents.py::test_split_sections_basic
- tests/test_documents.py::test_split_sections_multiple_blank_lines
